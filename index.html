<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGen — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #efefec; --white: #fff;
  --green: #2d5a27; --green2: #3d7535;
  --text: #1a1a1a; --text2: #555; --text3: #999;
  --border: #ddd; --inp: #e4e4e0; --r: 14px;
  --err: #c0392b;
}
body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

.card { background: var(--white); border-radius: 24px; padding: 44px 40px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,.08); }

.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.logo-sq { width: 48px; height: 48px; background: var(--green); border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-sq svg { width: 28px; height: 28px; }
.logo-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; line-height: 1; }
.logo-name span { color: var(--text3); font-weight: 400; }

h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; line-height: 1.5; }

.btn-google {
  width: 100%; padding: 14px 20px;
  background: #fff; color: #3c3c3c;
  border: 2px solid var(--border);
  border-radius: var(--r);
  font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-top: 8px;
}
.btn-google:hover:not(:disabled) {
  border-color: #aaa; background: #f8f8f8;
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
  transform: translateY(-1px);
}
.btn-google:disabled { opacity: .5; cursor: not-allowed; }

.btn-google svg { flex-shrink: 0; }

.divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--text3); font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.sp { width: 18px; height: 18px; border: 2px solid rgba(60,60,60,.2); border-top-color: #3c3c3c; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.err-msg { font-size: 13px; color: var(--err); margin-top: 16px; display: none; background: #fdf2f2; border-radius: 9px; padding: 9px 13px; }
.err-msg.show { display: block; }

.note { font-size: 12px; color: var(--text3); text-align: center; margin-top: 20px; line-height: 1.6; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-sq">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="2" y="20" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="white">E</text>
        <text x="14" y="26" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.8)">G</text>
      </svg>
    </div>
    <div class="logo-name">Edu<span>Gen</span></div>
  </div>

  <h2>Войти в EduGen</h2>
  <p class="sub">Используйте аккаунт Google для быстрого и безопасного входа.</p>

  <button class="btn-google" id="btnGoogle" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Войти через Google
  </button>

  <div class="err-msg" id="errMsg"></div>

  <p class="note">Нажимая «Войти», вы соглашаетесь с условиями использования EduGen.</p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDWoeMDdjr6bAeUrenZ5TzgNh8GBAqjsqI",
  authDomain: "edugen-9108a.firebaseapp.com",
  projectId: "edugen-9108a",
  storageBucket: "edugen-9108a.firebasestorage.app",
  messagingSenderId: "503357109913",
  appId: "1:503357109913:web:716dd637e8903220e02a08"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.signInWithGoogle = async function() {
  const btn = document.getElementById('btnGoogle');
  const errEl = document.getElementById('errMsg');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<div class="sp"></div> Входим...';

  try {
    const result = await signInWithPopup(auth, provider);
    sessionStorage.setItem('edugen_authed', '1');
    window.location.href = 'app.html';
  } catch(e) {
    console.error(e);
    let msg = 'Ошибка входа. Попробуйте снова.';
    if (e.code === 'auth/popup-closed-by-user') msg = 'Окно входа было закрыто. Попробуйте снова.';
    if (e.code === 'auth/network-request-failed') msg = 'Проблема с интернетом.';
    errEl.textContent = msg;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Войти через Google`;
  }
}
</script>
</body>
</html>
